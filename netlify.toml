# netlify.toml (repo root) — ENV_SPLIT_V1_15
# Bootstrap della BASE DIRECTORY per il sito Netlify V1 STAGING
# (ladieci-v1-staging, a3ad035a). L'app reale vive in ladieci-app33/.
#
# IMPORTANTE: con `base` impostata, Netlify usa come config ATTIVA il
# ladieci-app33/netlify.toml (verificato con `netlify build --dry`:
# "Config file: .../ladieci-app33/netlify.toml"). Quindi command/publish/
# functions/redirects/environment vanno definiti LÌ, non qui. Questo file
# serve SOLO a dire a Netlify dove sta l'app.
#
# ⚠️ Presente SOLO sul branch V1 (backup/v1-env-split-backend-url-2026-06-17).
# NON deve finire su main: la produzione vera builda da branch pulita.

[build]
  base = "ladieci-app33"
